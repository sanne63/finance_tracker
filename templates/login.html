<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - FinanceTracker</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="split-container">
        <!-- Bagian Kiri: Branding & Visual -->
        <div class="split-left">
            <div class="brand-wrapper">
                <div class="brand-logo-icon">
                    <!-- Wallet SVG Icon -->
                    <svg viewBox="0 0 24 24">
                        <path d="M21 18v1c0 1.1-.9 2-2 2H5c-1.11 0-2-.9-2-2V5c0-1.1.89-2 2-2h14c1.1 0 2 .9 2 2v1h-9c-1.11 0-2 .9-2 2v8c0 1.1.89 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                    </svg>
                </div>
                <span>FinanceTracker</span>
            </div>
            
            <div class="hero-content">
                <h1 class="hero-title">Kelola arus kas, <span>capai tujuan finansialmu.</span></h1>
                <p class="hero-desc">Dasbor sederhana, visual yang indah, dan kontrol penuh atas pemasukan & pengeluaranmu.</p>
            </div>
            
            <div class="split-footer">
                &copy; 2026 FinanceTracker
            </div>
        </div>
        
        <!-- Bagian Kanan: Form Login -->
        <div class="split-right">
            <div class="form-card">
                <div class="form-header">
                    <h2 class="form-title">Selamat datang kembali</h2>
                    <p class="form-subtitle">Masuk untuk melanjutkan ke dasbor keuanganmu.</p>
                </div>
                
                <!-- Alert Message -->
                <div id="alert-msg" class="alert" role="alert"></div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <!-- Envelope Icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </span>
                            <input class="form-input" type="email" id="email" placeholder="kamu@email.com" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="password">Kata sandi</label>
                        <div class="input-wrapper">
                            <span class="input-icon">
                                <!-- Lock Icon -->
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                                </svg>
                            </span>
                            <input class="form-input" type="password" id="password" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <button class="btn-submit" type="submit">
                        Masuk 
                        <svg viewBox="0 0 24 24" width="18" height="18">
                            <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
                        </svg>
                    </button>
                </form>
                
                <div class="form-footer">
                    Belum punya akun? <a href="{{ url_for('register') }}" class="form-link">Daftar sekarang</a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
